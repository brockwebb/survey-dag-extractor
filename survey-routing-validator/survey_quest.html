<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Quest - The Routing Adventure</title>
    <style>
        body {
            margin: 0; padding: 0; background: #2c3e50;
            font-family: 'Courier New', monospace;
            color: white; overflow: hidden;
        }
        
        .game-container {
            position: relative; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        
        .game-hud {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); padding: 10px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 2px solid #f39c12;
        }
        
        .hud-left {
            display: flex; gap: 20px; align-items: center;
        }
        
        .health-bar {
            width: 200px; height: 20px; background: #2c3e50;
            border: 2px solid #ecf0f1; border-radius: 10px;
            overflow: hidden; position: relative;
        }
        
        .health-fill {
            height: 100%; background: linear-gradient(90deg, #e74c3c, #f39c12, #f1c40f, #27ae60);
            transition: width 0.5s ease;
        }
        
        .health-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12px; font-weight: bold; color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.7);
        }
        
        .xp-counter {
            background: #8e44ad; padding: 8px 12px; border-radius: 15px;
            font-weight: bold; color: white;
        }
        
        .mini-map {
            position: absolute; top: 80px; right: 20px;
            width: 200px; height: 150px; background: rgba(0,0,0,0.8);
            border: 2px solid #3498db; border-radius: 8px;
            padding: 10px; z-index: 100;
        }
        
        #gameCanvas {
            display: block; margin: 60px auto 0;
            border: 3px solid #34495e; border-radius: 8px;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            background: #27ae60;
        }
        
        .node-tooltip {
            position: absolute; background: rgba(0,0,0,0.9);
            color: white; padding: 10px; border-radius: 6px;
            border: 2px solid #3498db; pointer-events: none;
            z-index: 200; display: none; max-width: 250px;
        }
        
        .validation-panel {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px;
            border: 2px solid #e74c3c; display: none; z-index: 150;
        }
        
        .btn {
            background: #3498db; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-family: inherit; margin: 0 5px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #2980b9; transform: translateY(-1px);
        }
        
        .btn-validate { background: #27ae60; }
        .btn-validate:hover { background: #229954; }
        .btn-flag { background: #f39c12; }
        .btn-flag:hover { background: #e67e22; }
        .btn-issue { background: #e74c3c; }
        .btn-issue:hover { background: #c0392b; }
        
        @keyframes nodeGlow {
            0% { filter: drop-shadow(0 0 5px #3498db); }
            50% { filter: drop-shadow(0 0 15px #3498db); }
            100% { filter: drop-shadow(0 0 5px #3498db); }
        }
        
        @keyframes treasureShine {
            0% { filter: drop-shadow(0 0 5px #f1c40f); }
            50% { filter: drop-shadow(0 0 20px #f1c40f); }
            100% { filter: drop-shadow(0 0 5px #f1c40f); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Game HUD -->
        <div class="game-hud">
            <div class="hud-left">
                <div>
                    <div style="font-size: 18px; font-weight: bold; color: #f39c12;">🗺️ SURVEY QUEST</div>
                    <div style="font-size: 12px; color: #bdc3c7;">The Routing Adventure</div>
                </div>
                
                <div>
                    <div style="font-size: 12px; margin-bottom: 3px;">Survey Health</div>
                    <div class="health-bar">
                        <div class="health-fill" id="healthFill" style="width: 0%"></div>
                        <div class="health-text" id="healthText">0%</div>
                    </div>
                </div>
                
                <div class="xp-counter">
                    ⭐ <span id="xpCount">0</span> XP
                </div>
                
                <div style="color: #ecf0f1; font-size: 12px;">
                    <div>📍 Current: <span id="currentNode">START</span></div>
                    <div>🎯 Block: <span id="currentBlock">Loading...</span></div>
                </div>
            </div>
            
            <div>
                <button class="btn" onclick="showFullMap()">📋 Full Map</button>
                <button class="btn" onclick="runAutoAnalysis()">🔍 Auto-Analyze</button>
                <button class="btn" onclick="exportAdventure()">💾 Save Progress</button>
            </div>
        </div>
        
        <!-- Mini Map -->
        <div class="mini-map">
            <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #3498db;">📊 Stats</div>
            <div style="font-size: 11px; line-height: 1.4;">
                <div>🟢 Validated: <span id="validatedCount">0</span></div>
                <div>🟡 Flagged: <span id="flaggedCount">0</span></div>
                <div>🔴 Issues: <span id="issuesCount">0</span></div>
                <div>💀 Dead Ends: <span id="deadEndsCount">0</span></div>
                <div>👻 Unreachable: <span id="unreachableCount">0</span></div>
                <div style="margin-top: 8px; color: #f39c12;">🏆 Progress: <span id="progressPercent">0%</span></div>
            </div>
        </div>
        
        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <!-- Node Tooltip -->
        <div class="node-tooltip" id="nodeTooltip">
            <div id="tooltipContent"></div>
        </div>
        
        <!-- Validation Panel -->
        <div class="validation-panel" id="validationPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #f39c12;">🎯 Node Validation</h3>
                <button class="btn" onclick="closeValidationPanel()">✕</button>
            </div>
            
            <div id="validationContent">
                <!-- Dynamic content goes here -->
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <button class="btn btn-validate" onclick="validateCurrentNode()">🟢 Validate</button>
                <button class="btn btn-flag" onclick="flagCurrentNode()">🟡 Flag for Review</button>
                <button class="btn btn-issue" onclick="reportIssue()">🔴 Report Issue</button>
                <button class="btn" onclick="editRouting()">✏️ Edit Routing</button>
            </div>
        </div>
    </div>
    
    <script>
        // Game State
        let gameState = {
            canvas: null,
            ctx: null,
            nodes: [],
            edges: [],
            currentNode: null,
            playerPosition: { x: 50, y: 50 },
            camera: { x: 0, y: 0 },
            surveyHealth: 0,
            xp: 0,
            stats: {
                validated: 0,
                flagged: 0,
                issues: 0,
                deadEnds: 0,
                unreachable: 0
            }
        };
        
        // Initialize Game
        document.addEventListener('DOMContentLoaded', function() {
            initializeGame();
        });
        
        function initializeGame() {
            gameState.canvas = document.getElementById('gameCanvas');
            gameState.ctx = gameState.canvas.getContext('2d');
            
            // Add event listeners
            gameState.canvas.addEventListener('click', handleCanvasClick);
            gameState.canvas.addEventListener('mousemove', handleCanvasMouseMove);
            gameState.canvas.addEventListener('mouseleave', hideTooltip);
            
            // Load survey data
            loadSurveyData();
            
            // Start game loop
            gameLoop();
        }
        
        function loadSurveyData() {
            // Mock data for now - will integrate with Flask backend
            gameState.nodes = [
                { id: 'INTRO_INCENTIVE', x: 100, y: 100, type: 'instruction', status: 'not_reviewed', block: 'entry_validation' },
                { id: 'Language', x: 250, y: 100, type: 'question', status: 'not_reviewed', block: 'entry_validation' },
                { id: 'Continue', x: 400, y: 100, type: 'instruction', status: 'not_reviewed', block: 'entry_validation' },
                { id: 'Q1', x: 550, y: 100, type: 'question', status: 'not_reviewed', block: 'entry_validation' },
                { id: 'D11', x: 100, y: 250, type: 'question', status: 'not_reviewed', block: 'demographics' },
                { id: 'END', x: 700, y: 400, type: 'terminal', status: 'validated', block: 'completion' }
            ];
            
            gameState.edges = [
                { from: 'INTRO_INCENTIVE', to: 'Language', path: generatePath(100, 100, 250, 100) },
                { from: 'Language', to: 'Continue', path: generatePath(250, 100, 400, 100) },
                { from: 'Continue', to: 'Q1', path: generatePath(400, 100, 550, 100) },
                { from: 'Q1', to: 'D11', path: generatePath(550, 100, 100, 250) },
                { from: 'D11', to: 'END', path: generatePath(100, 250, 700, 400) }
            ];
            
            // Set starting position
            gameState.currentNode = gameState.nodes[0];
            gameState.playerPosition = { x: gameState.currentNode.x, y: gameState.currentNode.y };
            
            updateStats();
        }
        
        function generatePath(x1, y1, x2, y2) {
            // Generate curved path between two points
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2 - 30; // Slight curve
            return `M${x1},${y1} Q${midX},${midY} ${x2},${y2}`;
        }
        
        function gameLoop() {
            // Clear canvas
            gameState.ctx.clearRect(0, 0, gameState.canvas.width, gameState.canvas.height);
            
            // Draw background
            drawBackground();
            
            // Draw edges (paths)
            drawEdges();
            
            // Draw nodes
            drawNodes();
            
            // Draw player
            drawPlayer();
            
            // Continue loop
            requestAnimationFrame(gameLoop);
        }
        
        function drawBackground() {
            const ctx = gameState.ctx;
            
            // Grass background with pattern
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, gameState.canvas.width, gameState.canvas.height);
            
            // Add some texture
            ctx.fillStyle = '#2ecc71';
            for (let x = 0; x < gameState.canvas.width; x += 40) {
                for (let y = 0; y < gameState.canvas.height; y += 40) {
                    if ((x + y) % 80 === 0) {
                        ctx.fillRect(x, y, 20, 20);
                    }
                }
            }
        }
        
        function drawEdges() {
            const ctx = gameState.ctx;
            
            gameState.edges.forEach(edge => {
                // Draw path
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                
                const fromNode = gameState.nodes.find(n => n.id === edge.from);
                const toNode = gameState.nodes.find(n => n.id === edge.to);
                
                if (fromNode && toNode) {
                    ctx.beginPath();
                    ctx.moveTo(fromNode.x, fromNode.y);
                    
                    // Simple line for now - can make curved later
                    ctx.lineTo(toNode.x, toNode.y);
                    ctx.stroke();
                    
                    // Add arrow
                    drawArrow(ctx, fromNode.x, fromNode.y, toNode.x, toNode.y);
                }
            });
        }
        
        function drawArrow(ctx, x1, y1, x2, y2) {
            const headlen = 15;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            
            // Move arrow to edge of target node
            const nodeRadius = 25;
            x2 = x2 - nodeRadius * Math.cos(angle);
            y2 = y2 - nodeRadius * Math.sin(angle);
            
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }
        
        function drawNodes() {
            const ctx = gameState.ctx;
            
            gameState.nodes.forEach(node => {
                // Node background
                const nodeColors = {
                    'instruction': '#3498db',
                    'question': '#e74c3c',
                    'terminal': '#f39c12'
                };
                
                const statusColors = {
                    'not_reviewed': '#95a5a6',
                    'flagged_for_review': '#f39c12',
                    'validated': '#27ae60',
                    'issues': '#e74c3c'
                };
                
                // Node circle
                ctx.fillStyle = nodeColors[node.type] || '#95a5a6';
                ctx.beginPath();
                ctx.arc(node.x, node.y, 25, 0, 2 * Math.PI);
                ctx.fill();
                
                // Status ring
                ctx.strokeStyle = statusColors[node.status] || '#95a5a6';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(node.x, node.y, 28, 0, 2 * Math.PI);
                ctx.stroke();
                
                // Node icon
                ctx.fillStyle = 'white';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const icons = {
                    'instruction': '📋',
                    'question': '❓',
                    'terminal': '🏁'
                };
                
                ctx.fillText(icons[node.type] || '⚪', node.x, node.y);
                
                // Node label
                ctx.fillStyle = '#2c3e50';
                ctx.font = 'bold 12px Courier New';
                ctx.fillText(node.id, node.x, node.y + 45);
            });
        }
        
        function drawPlayer() {
            const ctx = gameState.ctx;
            const player = gameState.playerPosition;
            
            // Player sprite (simple for now)
            ctx.fillStyle = '#8e44ad';
            ctx.beginPath();
            ctx.arc(player.x, player.y - 10, 12, 0, 2 * Math.PI);
            ctx.fill();
            
            // Player crown
            ctx.fillStyle = '#f1c40f';
            ctx.fillText('👑', player.x, player.y - 20);
        }
        
        function handleCanvasClick(event) {
            const rect = gameState.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // Check if clicked on a node
            const clickedNode = gameState.nodes.find(node => {
                const distance = Math.sqrt((node.x - x) ** 2 + (node.y - y) ** 2);
                return distance <= 30;
            });
            
            if (clickedNode) {
                selectNode(clickedNode);
            }
        }
        
        function selectNode(node) {
            gameState.currentNode = node;
            gameState.playerPosition = { x: node.x, y: node.y };
            
            // Update HUD
            document.getElementById('currentNode').textContent = node.id;
            document.getElementById('currentBlock').textContent = node.block;
            
            // Show validation panel
            showValidationPanel(node);
            
            // Play selection sound (could add audio later)
            console.log(`Selected node: ${node.id}`);
        }
        
        function handleCanvasMouseMove(event) {
            const rect = gameState.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // Check if hovering over a node
            const hoveredNode = gameState.nodes.find(node => {
                const distance = Math.sqrt((node.x - x) ** 2 + (node.y - y) ** 2);
                return distance <= 30;
            });
            
            if (hoveredNode) {
                showTooltip(event, hoveredNode);
                gameState.canvas.style.cursor = 'pointer';
            } else {
                hideTooltip();
                gameState.canvas.style.cursor = 'default';
            }
        }
        
        function showTooltip(event, node) {
            const tooltip = document.getElementById('nodeTooltip');
            const content = document.getElementById('tooltipContent');
            
            content.innerHTML = `
                <div style="font-weight: bold; color: #f39c12; margin-bottom: 5px;">${node.id}</div>
                <div style="font-size: 12px;">
                    <div>Type: ${node.type}</div>
                    <div>Block: ${node.block}</div>
                    <div>Status: ${node.status.replace('_', ' ')}</div>
                </div>
            `;
            
            tooltip.style.display = 'block';
            tooltip.style.left = (event.clientX + 10) + 'px';
            tooltip.style.top = (event.clientY - 50) + 'px';
        }
        
        function hideTooltip() {
            document.getElementById('nodeTooltip').style.display = 'none';
        }
        
        function showValidationPanel(node) {
            const panel = document.getElementById('validationPanel');
            const content = document.getElementById('validationContent');
            
            content.innerHTML = `
                <div style="margin-bottom: 10px;">
                    <strong>Node:</strong> ${node.id}<br>
                    <strong>Type:</strong> ${node.type}<br>
                    <strong>Block:</strong> ${node.block}<br>
                    <strong>Current Status:</strong> ${node.status.replace('_', ' ')}
                </div>
                <div style="background: #34495e; padding: 10px; border-radius: 4px; font-size: 12px;">
                    Mock routing information would go here...<br>
                    → Routes to: Language<br>
                    → Condition: Always<br>
                    → Confidence: 95%
                </div>
            `;
            
            panel.style.display = 'block';
        }
        
        function closeValidationPanel() {
            document.getElementById('validationPanel').style.display = 'none';
        }
        
        function validateCurrentNode() {
            if (gameState.currentNode) {
                gameState.currentNode.status = 'validated';
                gameState.xp += 10;
                updateStats();
                closeValidationPanel();
                
                // Achievement notification (could add)
                console.log(`✅ Validated ${gameState.currentNode.id}! +10 XP`);
            }
        }
        
        function flagCurrentNode() {
            if (gameState.currentNode) {
                gameState.currentNode.status = 'flagged_for_review';
                gameState.xp += 5;
                updateStats();
                closeValidationPanel();
                
                console.log(`🟡 Flagged ${gameState.currentNode.id} for review! +5 XP`);
            }
        }
        
        function reportIssue() {
            if (gameState.currentNode) {
                gameState.currentNode.status = 'issues';
                updateStats();
                closeValidationPanel();
                
                console.log(`🔴 Reported issue with ${gameState.currentNode.id}`);
            }
        }
        
        function updateStats() {
            // Calculate stats
            gameState.stats = {
                validated: gameState.nodes.filter(n => n.status === 'validated').length,
                flagged: gameState.nodes.filter(n => n.status === 'flagged_for_review').length,
                issues: gameState.nodes.filter(n => n.status === 'issues').length,
                deadEnds: 0, // TODO: Calculate
                unreachable: 0 // TODO: Calculate
            };
            
            // Update health
            const totalNodes = gameState.nodes.length;
            const processedNodes = gameState.stats.validated + gameState.stats.flagged;
            gameState.surveyHealth = Math.round((processedNodes / totalNodes) * 100);
            
            // Update UI
            document.getElementById('healthFill').style.width = gameState.surveyHealth + '%';
            document.getElementById('healthText').textContent = gameState.surveyHealth + '%';
            document.getElementById('xpCount').textContent = gameState.xp;
            document.getElementById('validatedCount').textContent = gameState.stats.validated;
            document.getElementById('flaggedCount').textContent = gameState.stats.flagged;
            document.getElementById('issuesCount').textContent = gameState.stats.issues;
            document.getElementById('deadEndsCount').textContent = gameState.stats.deadEnds;
            document.getElementById('unreachableCount').textContent = gameState.stats.unreachable;
            document.getElementById('progressPercent').textContent = gameState.surveyHealth + '%';
        }
        
        function runAutoAnalysis() {
            console.log('🔍 Running auto-analysis...');
            // TODO: Implement automated quality checks
            alert('Auto-analysis feature coming soon! 🔍');
        }
        
        function showFullMap() {
            console.log('📋 Showing full map...');
            // TODO: Implement full map view
            alert('Full map view coming soon! 🗺️');
        }
        
        function exportAdventure() {
            console.log('💾 Exporting adventure...');
            // TODO: Implement export functionality
            alert('Export feature coming soon! 💾');
        }
        
        function editRouting() {
            console.log('✏️ Editing routing...');
            // TODO: Implement routing editor
            alert('Routing editor coming soon! ✏️');
        }
    </script>
</body>
</html>
